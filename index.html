<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>購入者限定特典 3点セット｜現役看護師 lineon</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --mint:#A8D8C8;
  --mint-light:#E8F5F0;
  --mint-mid:#7BC4B0;
  --peach:#F4A69A;
  --peach-light:#FEF0EE;
  --text:#1a1a1a;
  --text-sub:#555;
  --text-muted:#888;
  --bg:#fafafa;
  --surface:#fff;
  --border:#e8e8e8;
  --border-strong:#d0d0d0;
  --radius:8px;
}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;line-height:1.7;min-height:100vh}
.page{max-width:680px;margin:0 auto;padding:24px 16px 60px}

/* header */
.site-header{padding:20px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px}
.site-header .label{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--mint-mid);text-transform:uppercase;margin-bottom:6px}
.site-header h1{font-size:20px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:4px}
.site-header .sub{font-size:13px;color:var(--text-sub)}

/* tabs */
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{flex:1;min-width:100px;padding:10px 8px;font-size:12px;font-weight:600;border-radius:var(--radius);border:1.5px solid var(--border-strong);background:var(--surface);color:var(--text-sub);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;line-height:1.3;transition:all .15s}
.tab svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab:hover{border-color:var(--mint-mid);color:var(--text)}
.tab.on{border-color:var(--mint-mid);background:var(--mint-light);color:#0F6E56;border-width:2px}
@media(min-width:480px){.tab{flex-direction:row;padding:10px 16px;font-size:13px;justify-content:center}}

/* panel */
.panel{display:none}.panel.on{display:block}
.panel-desc{font-size:13px;color:var(--text-sub);margin-bottom:16px;line-height:1.7}

/* card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.card-head{width:100%;padding:13px 16px;display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;text-align:left;min-height:50px}
.card-head:hover{background:#fafafa}
.card-title{font-size:13px;font-weight:600;color:var(--text);flex:1;line-height:1.4}
.card-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.chevron{width:16px;height:16px;stroke:var(--text-muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;transition:transform .2s}
.open .chevron{transform:rotate(180deg)}

/* badge */
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.b-accent{background:#E8F5F0;color:#0F6E56}
.b-green{background:#EAF3DE;color:#3B6D11}
.b-purple{background:#EEEDFE;color:#3C3489}
.b-amber{background:#FAEEDA;color:#633806}

/* fields */
.fields{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0}
.pill{font-size:11px;padding:3px 8px;border-radius:20px;background:#f4f4f4;border:1px solid var(--border);color:var(--text-sub)}

/* boxes */
.ex-box{background:#f8f8f8;border-radius:var(--radius);padding:12px;margin-bottom:10px}
.ex-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;font-weight:600}
.ex-text{font-size:13px;color:var(--text);line-height:1.7}
.hint-box{display:flex;gap:8px;align-items:flex-start;border-radius:var(--radius);padding:9px 11px;margin-bottom:12px}
.hint-box svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;margin-top:2px}
.hint-text{font-size:12px;line-height:1.6;margin:0}
.h-mint{background:var(--mint-light);color:#0F6E56}
.h-blue{background:#E6F1FB;color:#185FA5}
.h-green{background:#EAF3DE;color:#3B6D11}

/* copy btn */
.copy-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:9px 16px;border-radius:var(--radius);border:1.5px solid var(--border-strong);background:var(--surface);color:var(--text-sub);cursor:pointer;min-height:40px;transition:all .15s}
.copy-btn:hover{border-color:var(--mint-mid);background:var(--mint-light);color:#0F6E56}
.copy-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* neta */
.cat-head{width:100%;padding:13px 16px;display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;text-align:left;min-height:50px}
.cat-head:hover{background:#fafafa}
.cat-title{font-size:13px;font-weight:600;color:var(--text);flex:1}
.cat-count{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--mint-light);color:#0F6E56;display:none;flex-shrink:0}
.q-row{display:flex;align-items:flex-start;gap:12px;padding:11px 16px;border-top:1px solid var(--border);cursor:pointer;transition:background .1s}
.q-row:hover{background:#fafafa}
.q-row input{margin-top:3px;flex-shrink:0;width:16px;height:16px;cursor:pointer;accent-color:var(--mint-mid)}
.q-text{font-size:13px;line-height:1.6;color:var(--text)}
.q-row.checked{background:var(--mint-light)}
.q-row.checked .q-text{color:#0F6E56}
.total-badge{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;background:var(--mint-light);color:#0F6E56;white-space:nowrap}

/* sns */
.sns-num{font-size:12px;font-weight:700;color:var(--text-muted);flex-shrink:0;min-width:26px}
.tmpl-box{background:#f8f8f8;border-left:3px solid var(--mint-mid);padding:12px 14px;margin-bottom:10px;white-space:pre-line;font-size:13px;line-height:1.9;color:var(--text)}

/* footer */
.footer{margin-top:48px;padding-top:20px;border-top:1px solid var(--border);text-align:center}
.footer p{font-size:12px;color:var(--text-muted);line-height:1.8}

@media(min-width:560px){
  .card-title{font-size:14px}
  .ex-text{font-size:14px}
  .q-text{font-size:13px}
  .site-header h1{font-size:22px}
}
</style>
</head>

const qChecked={};
const CHEVRON=`<svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`;
const INFO=`<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
const COPY=`<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;
const CHECK=`<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

function sw(i){
  [0,1,2].forEach(j=>{
    document.getElementById('t'+j).classList.toggle('on',j===i);
    document.getElementById('p'+j).classList.toggle('on',j===i);
  });
}

function tog(id){
  const b=document.getElementById('cb'+id);
  const h=document.getElementById('ch'+id);
  const open=b.style.display==='block';
  b.style.display=open?'none':'block';
  h.classList.toggle('open',!open);
}

function cp(text,btnId){
  navigator.clipboard.writeText(text).then(()=>{
    const b=document.getElementById(btnId);
    if(!b)return;
    b.innerHTML=CHECK+' コピーしました';
    b.style.borderColor='var(--mint-mid)';
    b.style.background='var(--mint-light)';
    b.style.color='#0F6E56';
    setTimeout(()=>{
      b.innerHTML=COPY+' テンプレートをコピー';
      b.style.borderColor='';b.style.background='';b.style.color='';
    },2000);
  });
}

function toggleQ(ci,qi){
  const k=`${ci}-${qi}`;
  qChecked[k]=!qChecked[k];
  const chk=document.getElementById(`qchk-${ci}-${qi}`);
  const row=document.getElementById(`qrow-${ci}-${qi}`);
  const txt=document.getElementById(`qtxt-${ci}-${qi}`);
  if(chk)chk.checked=!!qChecked[k];
  if(row)row.classList.toggle('checked',!!qChecked[k]);
  if(txt)txt.style.color=qChecked[k]?N[ci].color:'';
  const total=Object.values(qChecked).filter(Boolean).length;
  const all=N.reduce((s,c)=>s+c.qs.length,0);
  const el=document.getElementById('qc');
  if(el)el.textContent=total+'/'+all;
  const cc=document.getElementById(`cc-${ci}`);
  if(cc){
    const cnt=N[ci].qs.filter((_,qi2)=>qChecked[`${ci}-${qi2}`]).length;
    cc.style.display=cnt>0?'inline':'none';
    cc.textContent=cnt+'/'+N[ci].qs.length;
    cc.style.background=N[ci].bg;
    cc.style.color=N[ci].color;
  }
}

function buildTitles(){
  document.getElementById('tlist').innerHTML=T.map(t=>`
<div class="card">
<button class="card-head" id="ch${t.id}" onclick="tog(${t.id})">
<span class="badge ${t.bc}">${t.type}</span>
<span class="card-title">${t.tmpl}</span>
${CHEVRON}
</button>
<div class="card-body" id="cb${t.id}">
<p style="font-size:11px;color:var(--text-muted);margin:12px 0 4px;font-weight:600">入れる内容</p>
<div class="fields">${t.fields.map((f,i)=>`<span class="pill">（　）${i+1}= ${f}</span>`).join('')}</div>
<div class="ex-box"><p class="ex-label">記入例</p><p class="ex-text">${t.ex}</p></div>
<div class="hint-box ${t.hc}">${INFO}<p class="hint-text">${t.hint}</p></div>
<button class="copy-btn" id="ctb${t.id}" onclick="cp(T[${t.id-1}].tmpl,'ctb${t.id}')">${COPY} テンプレートをコピー</button>
</div>
</div>`).join('');
}

function buildNeta(){
  document.getElementById('nlist').innerHTML=N.map((cat,ci)=>`
<div class="card">
<button class="cat-head" onclick="tog('n'+${ci})">
<span style="font-size:16px;margin-right:2px">${['🌱','😔','😅','✏️','🛤️','👥','🤝'][ci]}</span>
<span class="cat-title">${cat.cat}</span>
<span id="cc-${ci}" class="cat-count" style="display:none"></span>
${CHEVRON.replace('class="chevron"','class="chevron" id="chn'+ci+'"')}
</button>
<div class="card-body" id="cbn${ci}" style="padding:0">
${cat.qs.map((q,qi)=>`
<label class="q-row" id="qrow-${ci}-${qi}" onclick="toggleQ(${ci},${qi})">
<input type="checkbox" id="qchk-${ci}-${qi}" onclick="event.stopPropagation()" onchange="toggleQ(${ci},${qi})" style="margin-top:3px;flex-shrink:0;width:16px;height:16px;cursor:pointer;accent-color:${cat.color}">
<span class="q-text" id="qtxt-${ci}-${qi}">${q}</span>
</label>`).join('')}
</div>
</div>`).join('');
  N.forEach((_,ci)=>{
    const el=document.getElementById('chn'+ci);
    if(el){
      const orig=document.getElementById('cbn'+ci).style.display;
    }
  });
}

function buildSns(){
  document.getElementById('slist').innerHTML=S.map((t,idx)=>`
<div class="card">
<button class="card-head" id="chs${t.id}" onclick="tog('s'+${t.id})">
<span class="sns-num">${String(t.id).padStart(2,'0')}</span>
<span class="card-title">${t.pat}</span>
${CHEVRON}
</button>
<div class="card-body" id="cbs${t.id}">
<div class="hint-box h-blue" style="margin-top:12px">${INFO}<p class="hint-text">タイミング：${t.tim}</p></div>
<p style="font-size:11px;color:var(--text-muted);margin:0 0 6px;font-weight:600">テンプレート</p>
<div class="tmpl-box">${t.tmpl}</div>
<div class="hint-box h-green">${INFO}<p class="hint-text">${t.pt}</p></div>
<button class="copy-btn" id="csb${t.id}" onclick="cp(S[${idx}].tmpl,'csb${t.id}')">${COPY} テンプレートをコピー</button>
</div>
</div>`).join('');
}

function fixNetaToggle(){
  N.forEach((_,ci)=>{
    const orig=tog;
    document.querySelector(`#cbn${ci}`);
  });
}

const origTog=tog;
function tog(id){
  const bid='cb'+id;
  const hid='ch'+id;
  const b=document.getElementById(bid);
  const h=document.getElementById(hid);
  if(!b||!h)return;
  const open=b.style.display==='block';
  b.style.display=open?'none':'block';
  h.classList.toggle('open',!open);

buildTitles();buildNeta();buildSns();
</script>
